repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - duckdb>=1.3.0
          - types-pydantic

  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest with coverage gate
        entry: bash -c 'python3 -m pytest --cov=app --cov-fail-under=20 --cov-report=term-missing'
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
